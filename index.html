  <script>
    window.$docsify = {
      name: 'لائحة الدراسات العليا',
      nameLink: '/pgv4/',
      loadSidebar: true,
      subMaxLevel: 0,
      homepage: 'TOC.md',

      search: {
        placeholder: 'بحث...',
        noData: 'لا توجد نتائج',
        paths: 'auto',
        depth: 3,
        maxAge: 86400000,
      },

      auto2top: true,

      pagination: {
        previousText: 'السابق',
        nextText: 'التالي',
        crossChapter: true,
        crossChapterText: true,
      },

      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },

      plugins: [
        function mobileSidebar(hook) {
          hook.ready(function () {
            if (window.innerWidth <= 768) {
              // Prevent docsify's body-level click handler from toggling
              // the sidebar when tapping on page content
              document.querySelector('.content').addEventListener('click', function (e) {
                if (!e.target.closest('.sidebar-toggle')) {
                  e.stopPropagation();
                }
              });

              // Add close button inside sidebar
              var sidebar = document.querySelector('.sidebar');
              if (sidebar && !document.querySelector('.sidebar-close-btn')) {
                var closeBtn = document.createElement('button');
                closeBtn.className = 'sidebar-close-btn';
                closeBtn.innerHTML = '&times;';
                closeBtn.title = 'إغلاق القائمة';
                closeBtn.addEventListener('click', function (e) {
                  e.stopPropagation();
                  document.body.classList.add('close');
                });
                sidebar.insertBefore(closeBtn, sidebar.firstChild);
              }
            }
          });
          hook.doneEach(function () {
            if (window.innerWidth <= 768) {
              document.body.classList.add('close');
            }
          });
        },
        function pdfReferencePanel(hook) {
          var currentPages = [];
          var eastern = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
          function toEastern(n) {
            return String(n).replace(/\d/g, function(d) { return eastern[+d]; });
          }

          hook.beforeEach(function (content) {
            currentPages = [];
            var match;
            var re = /صفحة\s+(\d+)/g;
            while ((match = re.exec(content)) !== null) {
              var num = parseInt(match[1], 10);
              if (currentPages.indexOf(num) === -1) currentPages.push(num);
            }
            currentPages.sort(function(a, b) { return a - b; });
            return content;
          });

          hook.doneEach(function () {
            // Toggle button
            var btn = document.getElementById('pdf-toggle-btn');
            if (!btn) {
              btn = document.createElement('button');
              btn.id = 'pdf-toggle-btn';
              btn.className = 'pdf-toggle-btn';
              btn.title = 'عرض الأصل';
              btn.innerHTML = '📄';
              document.body.appendChild(btn);

              btn.addEventListener('click', function () {
                var panel = document.getElementById('pdf-panel');
                var isOpen = panel.classList.toggle('open');
                document.body.classList.toggle('pdf-open', isOpen);
              });
            }

            // Panel
            var panel = document.getElementById('pdf-panel');
            if (!panel) {
              panel = document.createElement('div');
              panel.id = 'pdf-panel';
              panel.className = 'pdf-panel';
              panel.innerHTML =
                '<div class="pdf-panel-header">' +
                  '<span>الصفحات الأصلية</span>' +
                  '<button class="pdf-panel-close" id="pdf-panel-close">&times;</button>' +
                '</div>' +
                '<div class="pdf-panel-body" id="pdf-panel-body"></div>';
              document.body.appendChild(panel);

              document.getElementById('pdf-panel-close').addEventListener('click', function () {
                panel.classList.remove('open');
                document.body.classList.remove('pdf-open');
              });
            }

            // Show/hide button based on available pages
            if (currentPages.length === 0) {
              btn.classList.add('hidden');
              panel.classList.remove('open');
              document.body.classList.remove('pdf-open');
            } else {
              btn.classList.remove('hidden');
            }

            // Populate panel with page images
            var body = document.getElementById('pdf-panel-body');
            var html = '';
            currentPages.forEach(function (num) {
              var padded = num < 10 ? '0' + num : '' + num;
              html +=
                '<div class="pdf-page-wrapper">' +
                  '<div class="pdf-page-label">صفحة ' + toEastern(num) + '</div>' +
                  '<img class="pdf-page-img" src="pdf_pages/page_' + padded + '.png" alt="صفحة ' + num + '" loading="lazy">' +
                '</div>';
            });
            body.innerHTML = html;
          });
        },
        function arabicNumerals(hook) {
          var eastern = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
          function toArabic(str) {
            return str.replace(/\d/g, function(d) { return eastern[+d]; });
          }
          hook.doneEach(function () {
            // Hide duplicate h1 when h2 has the same text
            var h1 = document.querySelector('.markdown-section h1');
            var h2 = document.querySelector('.markdown-section h2');
            if (h1 && h2) {
              var t1 = h1.textContent.replace(/\s+/g, '').replace(/:/g, '');
              var t2 = h2.textContent.replace(/\s+/g, '').replace(/:/g, '');
              if (t1 === t2) {
                h1.style.display = 'none';
              }
            }

            document.querySelectorAll('.sidebar-nav a').forEach(function (el) {
              var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
              var node;
              while (node = walker.nextNode()) {
                if (/\d/.test(node.textContent)) {
                  node.textContent = toArabic(node.textContent);
                }
              }
            });
            document.querySelectorAll(
              '.markdown-section h1, .markdown-section h2, .markdown-section h3, '
              + '.markdown-section a, .markdown-section strong, .markdown-section li, '
              + '.markdown-section p, .markdown-section td, .markdown-section th'
            ).forEach(function (el) {
              var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
              var node;
              while (node = walker.nextNode()) {
                if (/\d/.test(node.textContent)) {
                  node.textContent = toArabic(node.textContent);
                }
              }
            });
          });
        },
        function pageActions(hook, vm) {
          var repo = 'https://github.com/Elrashid/pgv4/edit/master/';
          hook.afterEach(function (html) {
            var path = vm.route.file;
            var homeBtn =
              '<a class="page-action-btn" href="#/">' +
                '<svg viewBox="0 0 16 16"><path d="M8.354 1.146a.5.5 0 00-.708 0l-6.5 6.5A.5.5 0 001.5 8.5h1v6a.5.5 0 00.5.5h3a.5.5 0 00.5-.5V11h2v3.5a.5.5 0 00.5.5h3a.5.5 0 00.5-.5v-6h1a.5.5 0 00.354-.854l-6.5-6.5z"/></svg>' +
                'الرئيسية' +
              '</a>';
            var editBtn = '';
            if (path) {
              editBtn =
                '<a class="page-action-btn" href="' + repo + path + '" target="_blank" rel="noopener">' +
                  '<svg viewBox="0 0 16 16"><path d="M11.013 1.427a1.75 1.75 0 012.474 0l1.086 1.086a1.75 1.75 0 010 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 01-.927-.928l.929-3.25a1.75 1.75 0 01.445-.758l8.61-8.61zm1.414 1.06a.25.25 0 00-.354 0L3.463 11.1a.25.25 0 00-.064.108l-.563 1.97 1.971-.564a.25.25 0 00.108-.064l8.61-8.61a.25.25 0 000-.353L12.427 2.487z"/></svg>' +
                  'تعديل هذه الصفحة' +
                '</a>';
            }
            return '<div class="page-actions">' + homeBtn + editBtn + '</div>' + html;
          });
        }
      ],
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- Pagination plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- WebMCP - expose site content to MCP-compatible AI tools -->
  <script src="https://cdn.jsdelivr.net/gh/jasonjmcghee/WebMCP@main/webmcp.js"></script>
  <script>
    (function() {
      if (typeof WebMCP === 'undefined') return;

      var mcp = new WebMCP({
        color: '#1B5E20',
        position: 'bottom-left',
        size: '36px',
        padding: '12px'
      });

      // Tool: Search articles by number
      mcp.registerTool(
        'search_article',
        'Search for a specific article (مادة) by number in the graduate studies regulations',
        { article_number: { type: 'string', description: 'Article number (e.g. "39" or "١٠٩")' } },
        function(args) {
          var num = args.article_number.replace(/[٠-٩]/g, function(d) {
            return '٠١٢٣٤٥٦٧٨٩'.indexOf(d);
          });
          var els = document.querySelectorAll('.markdown-section h3, .markdown-section p, .markdown-section li');
          var results = [];
          var pattern = new RegExp('مادة.*[\\(\\s]' + num + '[\\)\\s]');
          els.forEach(function(el) {
            if (pattern.test(el.textContent)) {
              results.push(el.textContent.trim().substring(0, 500));
            }
          });
          if (results.length === 0) {
            return { content: [{ type: 'text', text: 'Article ' + num + ' not found on the current page. Navigate to the correct section first.' }] };
          }
          return { content: [{ type: 'text', text: results.join('\n\n') }] };
        }
      );

      // Tool: Get current page content
      mcp.registerTool(
        'get_page_content',
        'Get the full text content of the currently displayed regulation page',
        {},
        function() {
          var content = document.querySelector('.markdown-section');
          return {
            content: [{
              type: 'text',
              text: content ? content.innerText : 'No content loaded'
            }]
          };
        }
      );

      // Tool: Navigate to a section
      mcp.registerTool(
        'navigate_to_section',
        'Navigate to a specific section of the regulations by section code (e.g. "2-3-11" for grades)',
        { section: { type: 'string', description: 'Section code like "1-1", "2-2-3", "2-3-11"' } },
        function(args) {
          var links = document.querySelectorAll('.sidebar-nav a');
          var found = false;
          links.forEach(function(link) {
            if (link.href && link.href.indexOf(args.section) !== -1) {
              link.click();
              found = true;
            }
          });
          return {
            content: [{
              type: 'text',
              text: found ? 'Navigated to section ' + args.section : 'Section ' + args.section + ' not found in sidebar'
            }]
          };
        }
      );

      // Tool: List all sections
      mcp.registerTool(
        'list_sections',
        'List all available sections in the regulations with their titles',
        {},
        function() {
          var links = document.querySelectorAll('.sidebar-nav a');
          var sections = [];
          links.forEach(function(link) {
            if (link.textContent.trim()) {
              sections.push(link.textContent.trim());
            }
          });
          return {
            content: [{
              type: 'text',
              text: sections.join('\n')
            }]
          };
        }
      );

      // Resource: Expose the full regulations text
      mcp.registerResource(
        'regulations-full',
        'Complete text of all 137 articles of the graduate studies regulations',
        { uri: 'regulations://full', mimeType: 'text/plain' },
        function(uri) {
          return fetch('llms-full.txt').then(function(r) { return r.text(); }).then(function(text) {
            return {
              contents: [{
                uri: uri,
                mimeType: 'text/plain',
                text: text
              }]
            };
          });
        }
      );

      // Resource: Expose the regulations index
      mcp.registerResource(
        'regulations-index',
        'Curated index of all regulation sections with descriptions',
        { uri: 'regulations://index', mimeType: 'text/plain' },
        function(uri) {
          return fetch('llms.txt').then(function(r) { return r.text(); }).then(function(text) {
            return {
              contents: [{
                uri: uri,
                mimeType: 'text/plain',
                text: text
              }]
            };
          });
        }
      );

      // Prompt: Ask about admission requirements
      mcp.registerPrompt(
        'admission-requirements',
        'Ask about admission requirements for graduate programs',
        [{
          name: 'program',
          description: 'Program type: masters or phd',
          required: false
        }],
        function(args) {
          var prog = args.program || 'masters';
          return {
            messages: [{
              role: 'user',
              content: {
                type: 'text',
                text: 'Based on the graduate studies regulations of Imam Malik College (Dubai), what are the admission requirements for the ' + prog + ' program? Include GPA requirements, English proficiency, and document requirements. Cite specific article numbers.'
              }
            }]
          };
        }
      );

      // Prompt: Ask about graduation requirements
      mcp.registerPrompt(
        'graduation-requirements',
        'Ask about graduation and thesis defense requirements',
        [],
        function() {
          return {
            messages: [{
              role: 'user',
              content: {
                type: 'text',
                text: 'Based on the graduate studies regulations of Imam Malik College (Dubai), what are all the graduation requirements? Include credit hours, GPA, thesis requirements, and defense procedures. Cite specific article numbers (مادة).'
              }
            }]
          };
        }
      );
    })();
  </script>
</body>
</html>
