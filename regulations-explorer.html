<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مستكشف لائحة الدراسات العليا</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0a1628 0%, #132744 40%, #1a3355 100%);
      font-family: 'Noto Kufi Arabic', 'Segoe UI', Tahoma, sans-serif;
      color: #e8edf5;
      direction: rtl;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .app-header {
      background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(212,175,55,0.05) 100%);
      border-bottom: 1px solid rgba(212,175,55,0.3);
      padding: 20px 24px;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #d4af37, #c5982e);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #0a1628;
      box-shadow: 0 2px 12px rgba(212,175,55,0.4);
    }
    .brand-title { margin: 0; font-size: 18px; font-weight: 700; color: #d4af37; letter-spacing: 0.5px; }
    .brand-sub { margin: 2px 0 0; font-size: 12px; color: #8899b3; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: #8899b3; text-decoration: none; font-size: 12px; font-weight: 600;
      padding: 5px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s; margin-left: 8px;
    }
    .back-link:hover { color: #d4af37; border-color: rgba(212,175,55,0.3); }

    .search-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(212,175,55,0.3);
      border-radius: 8px; padding: 8px 16px;
      color: #d4af37; cursor: pointer; font-size: 14px; font-family: inherit;
      display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .search-btn:hover { background: rgba(212,175,55,0.15); }
    .search-btn.active { background: rgba(212,175,55,0.2); }

    /* Search panel */
    .search-panel { margin-top: 16px; display: none; }
    .search-panel.open { display: block; }
    .search-input {
      width: 100%; padding: 12px 16px; border-radius: 8px;
      border: 1px solid rgba(212,175,55,0.4);
      background: rgba(0,0,0,0.3); color: #e8edf5;
      font-size: 15px; font-family: inherit; outline: none;
    }
    .search-input:focus { border-color: rgba(212,175,55,0.7); }
    .search-results {
      margin-top: 8px; max-height: 350px; overflow-y: auto;
      border-radius: 8px; background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08); display: none;
    }
    .search-results.has-results { display: block; }
    .search-count { padding: 8px 12px; font-size: 12px; color: #8899b3; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .search-item {
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s;
    }
    .search-item:hover { background: rgba(212,175,55,0.1); }
    .search-item-path { font-size: 11px; color: #d4af37; margin-bottom: 2px; }
    .search-item-text { font-size: 13px; color: #c0c8d8; }

    /* Quick Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 16px; }
    .stat-card {
      background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #d4af37; }
    .stat-label { font-size: 11px; color: #8899b3; margin-top: 2px; }
    .stat-sub { font-size: 10px; color: #5a6a82; }

    /* ── Bab Tabs ── */
    .bab-tabs {
      display: flex; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.15);
    }
    .bab-tab {
      flex: 1; padding: 12px 8px; border: none;
      background: transparent; color: #6a7a94;
      cursor: pointer; font-size: 13px; font-weight: 400; font-family: inherit;
      border-bottom: 2px solid transparent; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .bab-tab:hover { color: #8899b3; }
    .bab-tab.active { background: rgba(212,175,55,0.12); color: #d4af37; font-weight: 700; border-bottom-color: #d4af37; }
    .bab-tab-icon { font-size: 18px; }
    .bab-tab-label { font-size: 11px; text-align: center; line-height: 1.3; }

    /* ── Main Content ── */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Section List */
    .section-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .section-list-title { font-size: 16px; color: #d4af37; margin-bottom: 4px; font-weight: 600; }
    .section-list-sub { font-size: 12px; color: #6a7a94; margin-bottom: 16px; }
    .section-btn {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
      color: #e8edf5; cursor: pointer; text-align: right; transition: all 0.2s;
      display: flex; justify-content: space-between; align-items: center; font-family: inherit;
    }
    .section-btn:hover { background: rgba(212,175,55,0.08); border-color: rgba(212,175,55,0.25); }
    .section-btn-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .section-btn-count { font-size: 11px; color: #6a7a94; }
    .section-btn-arrow {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: rgba(212,175,55,0.15); display: flex; align-items: center; justify-content: center;
      color: #d4af37; font-size: 14px;
    }

    /* Articles View */
    .articles-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    .articles-view.active { display: flex; }
    .articles-header {
      padding: 12px 20px; background: rgba(0,0,0,0.1);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 10px;
    }
    .back-btn {
      background: rgba(212,175,55,0.15); border: none;
      border-radius: 6px; padding: 6px 10px; color: #d4af37;
      cursor: pointer; font-size: 13px; font-family: inherit;
    }
    .back-btn:hover { background: rgba(212,175,55,0.25); }
    .articles-title { font-size: 14px; font-weight: 600; color: #d4af37; }
    .articles-count { font-size: 11px; color: #6a7a94; margin-right: auto; }
    .articles-scroll { flex: 1; overflow-y: auto; padding: 12px 20px; }

    .article-card {
      margin-bottom: 10px; border-radius: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.2s; overflow: hidden;
    }
    .article-card.expanded { background: rgba(212,175,55,0.08); border-color: rgba(212,175,55,0.25); }
    .article-inner { padding: 12px 16px; display: flex; gap: 12px; align-items: flex-start; }
    .article-inner.clickable { cursor: pointer; }
    .article-num {
      min-width: 36px; height: 36px; border-radius: 8px;
      background: rgba(212,175,55,0.15); display: flex; align-items: center; justify-content: center;
      color: #d4af37; font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .article-text { flex: 1; margin: 0; font-size: 13.5px; line-height: 1.8; color: #c8d0de; white-space: pre-wrap; }
    .article-toggle { font-size: 11px; color: #d4af37; margin-top: 6px; opacity: 0.8; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* Mobile */
    @media (max-width: 640px) {
      .app-header { padding: 14px 16px; }
      .brand-title { font-size: 15px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .section-list { padding: 12px 14px; }
      .articles-scroll { padding: 10px 14px; }
      .bab-tab { padding: 10px 4px; }
      .bab-tab-label { font-size: 10px; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="app-header">
  <div class="header-top">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">

</div>

<!-- ═══ BAB TABS ═══ -->

<!-- ═══ MAIN CONTENT ═══ -->
<div class="main-content">

  <!-- Articles View -->

</div>

          { num: "ملحق٢-م٥", text: "أعمال لجنة المناقشة: المناقشة علنية تهدف للتوثق من الأمانة العلمية وإلمام الطالب وجدة الرسالة وسلامة اللغة. يعرض الطالب ملخصاً ثم يناقشه الأعضاء. يقيّم كل عضو فردياً من 100 درجة. إذا بلغ المتوسط 70% فأكثر: إجازة بتقدير الطالب (بتعديلات خلال 3 أشهر أو بدونها). إذا قلّ عن 70%: فرصة تعديل مع إعادة مناقشة خلال 6 أشهر، أو رفض الرسالة إن وُجد خطأ جسيم. يُعلن القرار علانية. يقدم الطالب 5 نسخ بعد الإجازة للاعتماد من مجلس الدراسات العليا ومجلس الكلية." }

          { num: "ملحق٣-رابعاً", text: "عدد صفحات الرسالة: لا يُشترط عدد محدد، غير أن على الطالب استيفاء عرض جميع محاور الرسالة بمنهجية فائقة واقتباس مادة علمية كافية ومناقشتها واستخلاص النواتج البحثية." },
          { num: "ملحق٣-خامساً", text: "التغليف — قبل المناقشة: 4 نسخ بتغليف عادي (ورقة شفافة أمامية + ورقة مقوى زرقاء في النهاية). بعد المناقشة: 5 نسخ بتغليف عالي الجودة باللون الأسود والكتابة بالذهبي، مع اسم الباحث والعنوان والسنة على العمود الجانبي." }

// ══════════════════════════════════════════════════════════════
// APPLICATION STATE & LOGIC
// ══════════════════════════════════════════════════════════════
var state = {
  activeBab: 0,
  activeSection: null,
  expandedArticle: null,
  showSearch: false
};

// Count total articles
var totalArticles = 0;
regulationsData.forEach(function(bab) {
  bab.sections.forEach(function(sec) { totalArticles += sec.articles.length; });
});
document.getElementById('totalCount').textContent = totalArticles;

// ── Search ──
var searchToggle = document.getElementById('searchToggle');
var searchPanel = document.getElementById('searchPanel');
var searchInput = document.getElementById('searchInput');
var searchResults = document.getElementById('searchResults');
var searchCount = document.getElementById('searchCount');
var searchItems = document.getElementById('searchItems');
var statsGrid = document.getElementById('statsGrid');

searchToggle.addEventListener('click', function() {
  state.showSearch = !state.showSearch;
  searchPanel.classList.toggle('open', state.showSearch);
  searchToggle.classList.toggle('active', state.showSearch);
  statsGrid.style.display = state.showSearch ? 'none' : '';
  if (state.showSearch) {
    searchInput.value = '';
    searchResults.classList.remove('has-results');
    searchInput.focus();
  }
});

searchInput.addEventListener('input', function() {
  var q = this.value.trim();
  if (!q) { searchResults.classList.remove('has-results'); return; }
  var results = [];
  regulationsData.forEach(function(bab, bi) {
    bab.sections.forEach(function(sec) {
      sec.articles.forEach(function(art) {
        if (art.text.indexOf(q) !== -1 || sec.title.indexOf(q) !== -1 || String(art.num).indexOf(q) !== -1) {
          results.push({ bab: bi, section: sec, article: art, sectionTitle: sec.title, babTitle: bab.babTitle });
        }
      });
    });
  });
  if (results.length === 0) { searchResults.classList.remove('has-results'); return; }
  searchResults.classList.add('has-results');
  searchCount.textContent = results.length + ' نتيجة';
  searchItems.innerHTML = '';
  results.forEach(function(r) {
    var item = document.createElement('div');
    item.className = 'search-item';
    item.innerHTML = '<div class="search-item-path">' + r.babTitle + ' › ' + r.sectionTitle + '</div>' +
      '<div class="search-item-text">مادة (' + r.article.num + ') — ' + r.article.text.substring(0, 80) + '...</div>';
    item.addEventListener('click', function() {
      state.activeBab = r.bab;
      state.activeSection = r.section.id;
      state.expandedArticle = r.article.num;
      state.showSearch = false;
      searchPanel.classList.remove('open');
      searchToggle.classList.remove('active');
      statsGrid.style.display = '';
      renderBabTabs();
      renderContent();
    });
    searchItems.appendChild(item);
  });
});

// ── Bab Tabs ──
var babTabsEl = document.getElementById('babTabs');

function renderBabTabs() {
  babTabsEl.innerHTML = '';
  regulationsData.forEach(function(bab, i) {
    var btn = document.createElement('button');
    btn.className = 'bab-tab' + (state.activeBab === i ? ' active' : '');
    btn.innerHTML = '<span class="bab-tab-icon">' + bab.babIcon + '</span><span class="bab-tab-label">' + bab.bab + '</span>';
    btn.addEventListener('click', function() {
      state.activeBab = i;
      state.activeSection = null;
      state.expandedArticle = null;
      renderBabTabs();
      renderContent();
    });
    babTabsEl.appendChild(btn);
  });
}

// ── Content ──
var sectionListEl = document.getElementById('sectionList');
var articlesViewEl = document.getElementById('articlesView');
var sectionListTitle = document.getElementById('sectionListTitle');
var sectionListSub = document.getElementById('sectionListSub');
var sectionButtons = document.getElementById('sectionButtons');
var articlesTitle = document.getElementById('articlesTitle');
var articlesCount = document.getElementById('articlesCount');
var articlesScroll = document.getElementById('articlesScroll');
var backBtn = document.getElementById('backBtn');

backBtn.addEventListener('click', function() {
  state.activeSection = null;
  state.expandedArticle = null;
  renderContent();
});

function renderContent() {
  var bab = regulationsData[state.activeBab];
  if (!state.activeSection) {
    // Show section list
    sectionListEl.style.display = '';
    articlesViewEl.classList.remove('active');
    sectionListTitle.textContent = bab.babIcon + ' ' + bab.babTitle;
    sectionListSub.textContent = bab.sections.length + ' أقسام — اختر قسماً لعرض مواده';
    sectionButtons.innerHTML = '';
    bab.sections.forEach(function(sec) {
      var btn = document.createElement('button');
      btn.className = 'section-btn';
      btn.innerHTML = '<div><div class="section-btn-title">' + sec.title + '</div>' +
        '<div class="section-btn-count">' + sec.articles.length + ' مادة</div></div>' +
        '<div class="section-btn-arrow">←</div>';
      btn.addEventListener('click', function() {
        state.activeSection = sec.id;
        state.expandedArticle = null;
        renderContent();
      });
      sectionButtons.appendChild(btn);
    });
  } else {
    // Show articles
    sectionListEl.style.display = 'none';
    articlesViewEl.classList.add('active');
    var sec = bab.sections.find(function(s) { return s.id === state.activeSection; });
    if (!sec) return;
    articlesTitle.textContent = sec.title;
    articlesCount.textContent = sec.articles.length + ' مادة';
    articlesScroll.innerHTML = '';
    sec.articles.forEach(function(art) {
      var isLong = art.text.length > 150;
      var isExpanded = state.expandedArticle === art.num;

      var card = document.createElement('div');
      card.className = 'article-card' + (isExpanded ? ' expanded' : '');

      var inner = document.createElement('div');
      inner.className = 'article-inner' + (isLong ? ' clickable' : '');

      var numEl = document.createElement('div');
      numEl.className = 'article-num';
      numEl.textContent = art.num;

      var bodyEl = document.createElement('div');
      bodyEl.style.flex = '1';

      var textEl = document.createElement('p');
      textEl.className = 'article-text';
      textEl.textContent = isLong && !isExpanded ? art.text.substring(0, 150) + '...' : art.text;

      bodyEl.appendChild(textEl);

      if (isLong) {
        var toggle = document.createElement('div');
        toggle.className = 'article-toggle';
        toggle.textContent = isExpanded ? '▲ اختصار' : '▼ عرض المزيد';
        bodyEl.appendChild(toggle);

        inner.addEventListener('click', (function(artNum) {
          return function() {
            state.expandedArticle = state.expandedArticle === artNum ? null : artNum;
            renderContent();
          };
        })(art.num));
      }

      inner.appendChild(numEl);
      inner.appendChild(bodyEl);
      card.appendChild(inner);
      articlesScroll.appendChild(card);
    });
    articlesScroll.scrollTop = 0;
  }
}

// ── Initial Render ──
renderBabTabs();
renderContent();
</script>

</html>
